name: Run OISST download & concat

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 0'

env:
  GADI_HOST: gadi.nci.org.au
  GADI_CODE: /g/data/jt48/aus-ref-clim-data-nci/oisst/code
  GADI_LOGS: /g/data/jt48/aus-ref-clim-data-nci/oisst/code

jobs:
  runcode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HPC_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.GADI_HOST }} >> ~/.ssh/known_hosts

      - name: Run download & concat on Gadi
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.HPC_USER }}@${{ env.GADI_HOST }} \
            bash -l << 'EOF'
              cd ${{ env.GADI_CODE }}
              yr=$(date +'%Y')

              echo "--- Starting download ---"
              bash oisst.sh -y $yr || { echo "Download failed"; exit 1; }

              echo "--- Starting concat ---"
              bash oisst_concat.sh -y $yr || { echo "Concat failed"; exit 1; }
          EOF

      - name: Copy logs from Gadi
        if: always()
        run: |
          scp -i ~/.ssh/id_ed25519 \
            ${{ secrets.HPC_USER }}@${{ env.GADI_HOST }}:${{ env.GADI_LOGS }}/update_log.txt \
            logs/update_log.txt
          scp -i ~/.ssh/id_ed25519 \
            ${{ secrets.HPC_USER }}@${{ env.GADI_HOST }}:${{ env.GADI_LOGS }}/concat_log.txt \
            logs/concat_log.txt

      - name: Commit and push logs
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/update_log.txt logs/concat_log.txt
          git diff --staged --quiet || git commit -m "chore: update OISST logs $(date '+%Y-%m-%d')"
          git push